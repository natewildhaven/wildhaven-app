packages:
  "framer-motion": "For dramatic pack opening animations and 3D card flipping"
  "react-confetti": "For celebrating legendary card pulls"
  "lucide-react": "Icons for UI"
  "clsx": "Utility for class merging"
  "tailwind-merge": "Utility for class merging"

images:
  - path: "artifacts/wildhaven/public/images/hero-bg.png"
    description: "Lush magical forest background, warm sunlight, green vines and glowing fireflies, friendly studio ghibli style art, bright and welcoming"
    aspect_ratio: "16:9"
  - path: "artifacts/wildhaven/public/images/logo.png"
    description: "A friendly wooden sign with leaves and vines around it, 2D game art style, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/wildhaven/public/images/pack-art.png"
    description: "A magical sealed card pack made of green leaves and vines bound with glowing magical string, 2D game icon style, transparent background"
    aspect_ratio: "3:4"
  - path: "artifacts/wildhaven/public/images/card-back.png"
    description: "The back of a collectible card, featuring a glowing golden tree symbol on a deep forest green background with intricate vine borders, high quality fantasy game art"
    aspect_ratio: "3:4"

notes:
  - API uses orval generated hooks from @workspace/api-client-react
  - Pack opening requires full screen animation
